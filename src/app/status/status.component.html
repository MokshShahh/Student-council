<div class="page-area">
  <div class="pg-head">
    <h2>My Applications</h2>
    <p>Track the status of your committee applications</p>
  </div>

  <div class="tbl-wrap" *ngIf="applications.length > 0">
    <table>
      <thead>
        <tr>
          <th>Committee Name</th>
          <th>Applied On</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let app of applications">
          <td>{{ app.committee_name }}</td>
          <td>{{ app.created_at | date:'mediumDate' }}</td>
          <td>
            <span class="spill" [ngClass]="{
              'spill-accepted': app.status === 'Accepted',
              'spill-pending': app.status === 'Pending',
              'spill-rejected': app.status === 'Rejected'
            }">{{ app.status }}</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="empty-st" *ngIf="applications.length === 0">
    <i class="fas fa-file-invoice"></i>
    <p>You haven't applied to any committees yet.</p>
    <button class="btn-pri" routerLink="/committee">Browse Committees</button>
  </div>
</div>
