<div class="auth-box">

  <h2>Register Event</h2>

  <input placeholder="Event Title" [(ngModel)]="title">
  <input placeholder="Description" [(ngModel)]="description">
  <input type="date" [(ngModel)]="date">
  <input placeholder="Venue" [(ngModel)]="venue">

  <button (click)="submitEvent()">Submit</button>

</div>
