<div class="page-area">
  <div class="hero">
    <h1>MPSTME Council</h1>
    <p>Lead. Create. Inspire</p>
    <div style="display: flex; gap: 20px;">
      <button class="btn-pri fw" routerLink="/events" style="width: auto; padding: 1rem 2.5rem;">Explore Events</button>
      <button class="btn-out fw" routerLink="/register" style="width: auto; padding: 1rem 2.5rem;">Join the Council</button>
    </div>
  </div>

  <div class="sec-title" style="margin-top: 100px;">
    <h3><i class="fas fa-users"></i> Student Committees</h3>
  </div>

  <div class="grid-4">
    <div class="comm-card" *ngFor="let c of committees" [routerLink]="['/committee', c.id]">
      <div class="comm-top" 
           [style.background]="c.logo_url ? ('url(' + c.logo_url + ') center/cover' | safe:'style') : (c.gradient || 'linear-gradient(135deg,#667eea,#764ba2)')" 
           style="height: 120px; display: flex; align-items: center; justify-content: center;">
        <i *ngIf="!c.logo_url" class="fas fa-users" style="font-size: 3rem; color: var(--accent-neon);"></i>
      </div>
      <div class="comm-body">
        <h4>{{ c.name }}</h4>
        <p>{{ c.description || 'Dedicated to student growth and campus excellence.' }}</p>
      </div>
    </div>
  </div>
</div>
