<div class="events-page">
  <div class="hero-section">
    <h1>Explore Upcoming Events</h1>
    <p>Discover and register for the latest campus activities.</p>
  </div>

  <div class="events-grid">
    <div class="event-card" *ngFor="let event of events()">
      <div class="card-image">
        <img [src]="event.banner || 'https://via.placeholder.com/400x200?text=Event+Image'" [alt]="event.name">
        <div class="category-badge" *ngIf="event.is_approved">Approved</div>
      </div>
      <div class="card-content">
        <h3>{{event.name}}</h3>
        <p class="description">{{event.description}}</p>
        
        <div class="event-meta">
          <div class="meta-item" *ngIf="event.start_time">
            <span class="icon">📅</span>
            {{event.start_time | date:'mediumDate'}}
          </div>
        </div>

        <div class="card-actions">
          <a [href]="event.registration_link" target="_blank" class="btn btn-primary" *ngIf="event.registration_link">Register Now</a>
          <button class="btn btn-secondary" [routerLink]="['/committee', event.committee_id]" *ngIf="event.committee_id">View Committee</button>
        </div>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="events().length === 0">
    <p>No upcoming events at the moment. Check back later!</p>
  </div>
</div>
