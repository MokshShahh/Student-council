<h2>Admin Dashboard</h2>

<div *ngFor="let event of events" class="card">

  <h3>{{event.name}}</h3>
  <p>{{event.description}}</p>

  <p *ngIf="event.is_approved" style="color: lightgreen;">Approved</p>
  <p *ngIf="!event.is_approved" style="color: orange;">Pending</p>

  <button *ngIf="!event.is_approved" (click)="approve(event)">
    Approve
  </button>

</div>
