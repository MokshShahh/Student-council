<div class="page-area">
  <div class="pg-head">
    <h2>Admin Dashboard</h2>
    <p>Events Pending Approval</p>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Event Name</th>
          <th>Description</th>
          <th>Start Time</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let event of pendingEvents">
          <td>{{ event.name }}</td>
          <td>{{ event.description }}</td>
          <td>{{ event.start_time | date:'medium' }}</td>
          <td>
            <button class="btn-acc" (click)="approveEvent(event.id)">
              <i class="fas fa-check"></i> Approve
            </button>
          </td>
        </tr>
        <tr *ngIf="pendingEvents.length === 0">
          <td colspan="4" style="text-align: center; padding: 20px;">No pending events</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
