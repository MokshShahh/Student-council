<div class="page-area">
  <div class="pg-head">
    <h2>Student Dashboard</h2>
    <p>Welcome back, {{ currentUser?.email }}</p>
  </div>

  <div class="sec-title">
    <h3><i class="fas fa-calendar-check"></i> My Registered Events</h3>
  </div>

  <div class="ev-grid" *ngIf="myEvents.length > 0">
    <div class="ev-card" *ngFor="let e of myEvents">
      <div class="ev-top" [style.background-image]="'url(' + (e.banner || 'https://via.placeholder.com/400x150') + ')' | safe:'style'" style="background-size: cover;"></div>
      <div class="ev-body">
        <h4>{{ e.name }}</h4>
        <p>{{ e.description }}</p>
        <div class="ev-meta">
          <span><i class="fas fa-calendar"></i> {{ e.start_time | date:'short' }}</span>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-st" *ngIf="myEvents.length === 0">
    <i class="fas fa-calendar-times"></i>
    <p>You haven't registered for any events yet.</p>
    <button class="btn-pri" routerLink="/events">Browse Events</button>
  </div>

  <div class="sec-title" style="margin-top: 40px;">
    <h3><i class="fas fa-users"></i> Our Committees</h3>
  </div>

  <div class="grid-4">
    <div class="comm-card" *ngFor="let c of committees" routerLink="/committee">
      <div class="comm-top" 
           [style.background]="c.logo_url ? ('url(' + c.logo_url + ') center/cover' | safe:'style') : (c.gradient || 'linear-gradient(135deg,#667eea,#764ba2)')" 
           style="height: 80px; display: flex; align-items: center; justify-content: center;">
        <i *ngIf="!c.logo_url" class="fas" [ngClass]="c.icon || 'fa-users'"></i>
      </div>
      <div class="comm-body">
        <h4>{{ c.name }}</h4>
        <p>{{ c.description }}</p>
      </div>
    </div>
  </div>
</div>
